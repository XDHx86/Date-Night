# =============================================================================
# E2E Tests Workflow (Playwright)
# =============================================================================
# This workflow runs end-to-end tests using Playwright.
# Tests cover user journeys, regression, accessibility, and visual regression.

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to test"
        required: false
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      project:
        description: "Test project to run"
        required: false
        default: ""
        type: string

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_ENV: test

jobs:
  e2e-chromium:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    if: github.event.inputs.browser == 'chromium' || github.event.inputs.browser == '' || github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start development server
        run: bun run dev &
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Wait for server
        run: |
          echo "Waiting for server..."
          bunx wait-on http://localhost:3000 -t 60000
          echo "Server is ready!"

      - name: Run Playwright tests
        run: bun run test:e2e:chrome
        env:
          BASE_URL: http://localhost:3000

      - name: Stop dev server
        if: always()
        run: pkill -f "bun run dev" || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-chromium
          path: |
            playwright-results/
            playwright-report/
          retention-days: 30

  e2e-firefox:
    name: E2E Tests (Firefox)
    runs-on: ubuntu-latest
    if: github.event.inputs.browser == 'firefox' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps firefox

      - name: Start development server
        run: bun run dev &
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Wait for server
        run: bunx wait-on http://localhost:3000 -t 60000

      - name: Run Playwright tests on Firefox
        run: bun run test:e2e:firefox
        env:
          BASE_URL: http://localhost:3000

      - name: Stop dev server
        if: always()
        run: pkill -f "bun run dev" || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-firefox
          path: |
            playwright-results/
            playwright-report/
          retention-days: 30

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    # Only run on main branch (for baselines) or PRs (for comparison)
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start development server
        run: bun run dev &
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Wait for server
        run: bunx wait-on http://localhost:3000 -t 60000

      - name: Run visual regression tests
        run: bunx playwright test --project=visual
        env:
          BASE_URL: http://localhost:3000

      - name: Stop dev server
        if: always()
        run: pkill -f "bun run dev" || true

      - name: Upload visual diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression
          path: |
            playwright-report/
            tests/e2e/visual/baselines/
          retention-days: 30

      - name: Upload baseline updates (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # This would update baselines committed to the repo
          # Will need manual review and commit
          echo "Baseline updates available for review"

  accessibility:
    name: Accessibility Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start development server
        run: bun run dev &
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Wait for server
        run: bunx wait-on http://localhost:3000 -t 60000

      - name: Run accessibility tests
        run: bunx playwright test --project=accessibility
        env:
          BASE_URL: http://localhost:3000

      - name: Stop dev server
        if: always()
        run: pkill -f "bun run dev" || true

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: |
            playwright-report/
            playwright-results/
          retention-days: 30
