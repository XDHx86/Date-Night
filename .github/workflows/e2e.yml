# End-to-end Playwright tests.
# Server lifecycle is owned by playwright.config.ts (`webServer.webServer`).
# Jobs only spin up Playwright browser binaries and execute the suites.

name: E2E

on:
  workflow_call:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-chromium:
    name: E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers (Chromium)
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests (Chromium)
        run: bunx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-chromium
          path: |
            playwright-report/
            playwright-results/
          retention-days: 14

  e2e-firefox:
