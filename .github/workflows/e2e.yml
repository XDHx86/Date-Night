# End-to-end Playwright tests.
#
# The matrix covers `setup`, smoke, all three browsers, two mobile
# profiles, visual regression and accessibility. Server lifecycle is
# owned by `playwright.config.ts` (`webServer`).

name: E2E

on:
  workflow_call:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-setup:
    name: Setup
    uses: ./.github/workflows/reusable/setup-bun-playwright.yml
    permissions:
      contents: read

  e2e-user-journeys:
    name: User journeys
    needs: e2e-setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: e2e-cache
          path: ~/.cache
      - name: Run user journeys (desktop Chrome)
        run: bunx playwright test --project=user-journeys-desktop --project=setup
        env:
          PORT: 3000
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-user-journeys
          path: |
            playwright-report/
            playwright-results/
          retention-days: 14

  e2e-cross-browser:
    name: Cross-browser matrix
    needs: e2e-setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run browser matrix
        run: bunx playwright test --project=${{ matrix.browser }}
        env:
          PORT: 3000
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.browser }}
          path: |
            playwright-report/
            playwright-results/
          retention-days: 14

  e2e-responsive:
    name: Responsive matrix
    needs: e2e-setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        profile: [mobile-chrome, mobile-safari, tablet]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run responsive matrix
        run: bunx playwright test --project=${{ matrix.profile }}
        env:
          PORT: 3000
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.profile }}
          path: |
            playwright-report/
            playwright-results/
          retention-days: 14

  e2e-visual:
    name: Visual regression
    needs: e2e-setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run visual regression
        run: bunx playwright test --project=visual
        env:
          PORT: 3000
      - name: Upload visual diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual
          path: |
            playwright-report/
            tests/e2e/visual/baselines/
          retention-days: 14

  e2e-a11y:
    name: Accessibility (axe)
    needs: e2e-setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run accessibility scans
        run: bunx playwright test --project=accessibility
        env:
          PORT: 3000
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-accessibility
          path: |
            playwright-report/
            playwright-results/
          retention-days: 14

  e2e-performance:
    name: Performance budgets
    needs: e2e-setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run performance suite
        run: bunx playwright test --project=performance
        env:
          PORT: 3000
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-performance
          path: playwright-report/
          retention-days: 14

  e2e-regression:
    name: Regression suite
    needs: e2e-setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run regression suite
        run: bunx playwright test --project=regression
        env:
          PORT: 3000
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-regression
          path: playwright-report/
          retention-days: 14

  e2e-smoke:
    name: E2E smoke
    needs: e2e-setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run smoke suite
        run: bunx playwright test --project=smoke --project=setup
        env:
          PORT: 3000
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke
          path: playwright-report/
          retention-days: 7
