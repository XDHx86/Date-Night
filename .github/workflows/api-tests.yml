# API contract tests.
#
# Two layers:
#   • MSW-backed Vitest suite — fetch-level, deterministic.
#   • Postman + Newman suite   — hits the live dev server (started by
#     Playwright as part of test:e2e) for end-to-end HTTP coverage.
#
# The Newman job only runs on `main` or when a PR carries the
# `run-api` label — Newman requires an installed browser/runtime,
# managed via npx (no extra install footprint).

name: API Tests

on:
  workflow_call:

concurrency:
  group: api-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----- MSW + Vitest contract ------------------------------------------
  contract:
    name: API contract (Vitest + MSW)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run API contract suite
        run: bun run test:api

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: coverage/api/
          retention-days: 7

  # ----- Newman + Postman live server -----------------------------------
  newman:
    name: API contract (Newman)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start dev server
        run: bun run dev &
        env:
          PORT: 3000

      # Give the dev server a moment to bind.
      - name: Wait for dev server
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:3000/ > /dev/null; then
              echo "server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server failed to start"
          exit 1

      - name: Run Newman against the dev server
        uses: actions/github-script@v7
        with:
          script: |
            const { spawnSync } = require('child_process');
            const result = spawnSync('npx', ['--yes', 'newman', 'run',
              'postman/datenight-api.postman_collection.json',
              '--environment', 'postman/datenight-local.postman_environment.json',
              '--reporters', 'cli,junit',
              '--reporter-junit-export', 'test-results/newman.xml',
              '--disable-unicode',
            ], { stdio: 'inherit' });
            if (result.status !== 0) process.exit(result.status);

      - name: Upload Newman artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: test-results/newman.xml
          retention-days: 7
