# Reusable workflow: set up Node.js and install dependencies via npm.
# Consumes no inputs, returns no outputs. Callers chain off `needs: setup-npm`.

name: Setup npm

on:
  workflow_call:

permissions:
  contents: read

jobs:
  setup-npm:
    name: Setup npm
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js with built-in npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            package.json

      - name: Install dependencies (CI lockfile install)
        run: npm ci

      - name: Verify Node.js installation
        run: |
          node --version
          npm --version
