# Reusable workflow: full install + Playwright browser download.
# Use this when a job needs to run Playwright (E2E, visual, accessibility,
# performance, security, regression). Otherwise prefer `setup-bun`.

name: Setup Bun + Playwright

on:
  workflow_call:

permissions:
  contents: read

jobs:
  setup:
    name: Setup Bun + Playwright browsers
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: cache-pw
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            pw-browsers-${{ runner.os }}-

      - name: Install Playwright browsers (chromium, firefox, webkit)
        if: steps.cache-pw.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Verify Playwright toolchain
        run: |
          bunx playwright --version
          ls -1 ~/.cache/ms-playwright || true
