# Reusable workflow: set up Bun and install dependencies.
# Consumes no inputs, returns no outputs. Callers chain off `needs: setup-bun`.

name: Setup Bun

on:
  workflow_call:

permissions:
  contents: read

jobs:
  setup-bun:
    name: Setup Bun
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun with built-in cache
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Verify Bun installation
        run: |
          bun --version
          echo "node_modules=$(test -d node_modules && echo yes || echo no)"
