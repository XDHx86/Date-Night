# Production build verification.
#
# Outputs to .output/ (TanStack Start / Vinxi convention). Reports the
# build size on every run so contributors can spot a regression quickly.

name: Build

on:
  workflow_call:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-bun:
    name: Build (Bun)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run production build
        run: bun run build

      - name: Verify build output
        run: test -d .output && echo "✅ Build succeeded — .output directory present"

      - name: Measure build size
        run: |
          echo "=== Build size ==="
          du -sh .output || true
          echo "=== Top entries ==="
          find .output -maxdepth 2 -type d -printf "%p\t%s bytes\n" 2>/dev/null | head -20

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: .output/
          retention-days: 7

  build-npm:
    name: Build (npm, parity)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-bun
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            package.json

      - name: Install dependencies
        run: npm ci

      - name: Run production build
        run: npm run build

      - name: Verify build output
        run: test -d .output && echo "✅ npm build succeeded"
