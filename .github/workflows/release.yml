# Manual release workflow.
# Bumps the version, builds production artifacts, and creates a draft
# GitHub Release. Tag/version pushes only happen after the release is
# published (the "promote" job below is intentionally a no-op when
# released in draft mode — finalising happens via gh release edit).

name: Release

on:
  workflow_dispatch:
    inputs:
      version-type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      version-bump:
        description: "Explicit version (only used when version-type=custom)"
        required: false
        default: ""
        type: string
      draft:
        description: "Create as a draft release"
        required: false
        default: "true"
        type: boolean
      prerelease:
        description: "Mark as a pre-release"
        required: false
        default: "false"
        type: boolean
      release-notes:
        description: "Optional release notes body"
        required: false
        default: ""
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  preflight:
    name: Pre-flight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      next-version: ${{ steps.version.outputs.next }}
      release-body: ${{ steps.body.outputs.body }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        env:
          TYPE: ${{ inputs.version-type }}
          CUSTOM: ${{ inputs.version-bump }}
        run: |
          # Read current version from package.json
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          if [ "$TYPE" = "custom" ]; then
            if [ -z "$CUSTOM" ]; then
              echo "::error::version-bump is required when version-type=custom"
              exit 1
            fi
            NEXT="$CUSTOM"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "$TYPE" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEXT="$MAJOR.$MINOR.$PATCH"
          fi
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Fetch last tag (used for changelog)
        id: last-tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Last tag: ${TAG:-<none>}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: body
        env:
          NOTES: ${{ inputs.release-notes }}
        run: |
          if [ -n "$NOTES" ]; then
            BODY="$NOTES"
          else
            HEADER="## What's Changed"
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)" 2>/dev/null || true)
            if [ -z "$COMMITS" ]; then
              COMMITS="- Initial release"
            fi
            BODY="$HEADER
          $COMMITS"
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump version in package.json
        env:
          VERSION: ${{ needs.preflight.outputs.next-version }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build production bundle
        run: bun run build

      - name: Verify build output
        run: test -d .output && echo "✅ Build output present"

      - name: Package source tarball
        run: |
          VERSION="${{ needs.preflight.outputs.next-version }}"
          mkdir -p release/
          tar -czf "release/datenight-v${VERSION}-source.tar.gz" \
            --exclude='./node_modules' \
            --exclude='./.output' \
            --exclude='./coverage' \
            --exclude='./playwright-report' \
            --exclude='./playwright-results' \
            --exclude='./test-results' \
            .

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ needs.preflight.outputs.next-version }}
          path: release/
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-${{ needs.preflight.outputs.next-version }}
          path: release/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.preflight.outputs.next-version }}
          name: "Datenight v${{ needs.preflight.outputs.next-version }}"
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: false
          body: ${{ needs.preflight.outputs.release-body }}
          files: |
            release/datenight-v${{ needs.preflight.outputs.next-version }}-source.tar.gz
