# Dependency validation.
#
# Stable, low-cost checks that complement Dependabot:
#   • Confirm lockfiles are in sync with package.json (Bun + npm).
#   • Run a fresh `bun install --frozen-lockfile` against the committed
#     lockfiles to prove they reproduce.
#   • Confirm Bun's supply-chain guard (24h minimum-release-age) wasn't
#     bypassed accidentally.

name: Dependency Validation

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deps-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-lockfile:
    name: Lockfile parity (Bun)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Reproduce install with frozen lockfile
        run: bun install --frozen-lockfile

      - name: Confirm Bun can resolve the tree from scratch
        # Don't write a new lockfile — just confirm Bun's resolver succeeds.
        run: bun install --no-save --no-lockfile
        continue-on-error: true

  verify-npm-lockfile:
    name: Lockfile parity (npm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            package.json

      - name: Reproduce install with frozen lockfile
        run: npm ci

  supplies-guard:
    name: Supply-chain guard (Bun)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read bunfig exclusions
        id: exclusions
        run: |
          echo "Bun enforces a 24h minimum-release-age on packages. Bypasses:"
          cat bunfig.toml
        continue-on-error: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml
