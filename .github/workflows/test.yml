# =============================================================================
# Unit & Integration Tests Workflow
# =============================================================================
# This workflow runs unit and integration tests with Vitest.

name: Test

on:
  push:
    branches: [main, develop]
    paths:
      - "**.{ts,tsx,js,jsx}"
      - "**/vitest.config.ts"
      - "**/test*.{ts,tsx}"
  pull_request:
    branches: [main]
    paths:
      - "**.{ts,tsx,js,jsx}"
      - "**/vitest.config.ts"
      - "**/test*.{ts,tsx}"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  VITEST_BROWSER: "jsdom"

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers (for potential browser tests)
        run: bun run playwright:install --with-deps chromium

      - name: Run Vitest
        run: bun run test

      - name: Run Vitest with coverage
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        run: bun run test:coverage

      - name: Upload coverage report
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: |
            coverage/
            test-results/
          retention-days: 30

      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          flags: vitest
          fail_ci_if_error: false

  # Run tests with Bun's native test runner as well (if configured)
  test-bun:
    name: Bun Native Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun tests (if any .bun.test.ts files exist)
        run: |
          # Find and run any Bun test files
          if [ -n "$(find . -name '*.bun.test.ts' -o -name '*.bun.test.js' 2>/dev/null | head -1)" ]; then
            bun test
          else
            echo "No Bun native tests found, skipping."
          fi
