# Main CI pipeline. Composes the suites via reusable workflows and
# parallel jobs, with concurrency on the same ref.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: "ci-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---- Static analysis ----------------------------------------------------
  lint:
    name: Lint & Type Check
    uses: ./.github/workflows/lint.yml
    permissions:
      contents: read

  format-check:
    name: Prettier Format Check
    uses: ./.github/workflows/format-check.yml
    permissions:
      contents: read

  # ---- Build verification -------------------------------------------------
  build:
    name: Production Build
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read

  # ---- Tests --------------------------------------------------------------
  unit-tests:
    name: Unit & Integration Tests
    needs: lint
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  api-tests:
    name: API Contract Tests
    needs: lint
    uses: ./.github/workflows/api-tests.yml
    permissions:
      contents: read

  smoke-tests:
    name: Build Smoke Tests
    needs: [lint, build]
    if: "github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-smoke')"
    uses: ./.github/workflows/smoke-tests.yml
    permissions:
      contents: read

  e2e:
    name: End-to-End Tests
    needs: [lint, build]
    if: "github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e')"
    uses: ./.github/workflows/e2e.yml
    permissions:
      contents: read

  # ---- Security -----------------------------------------------------------
  security:
    name: Security Scan
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      security-events: write

  # ---- Dependency hygiene -------------------------------------------------
  dependencies:
    name: Dependency Validation
    uses: ./.github/workflows/dependency-validation.yml
    permissions:
      contents: read
