# =============================================================================
# Main CI Pipeline
# =============================================================================
# This workflow runs the complete CI pipeline including:
# - Linting and formatting checks
# - Type checking
# - Unit and integration tests
# - E2E tests
# - Build verification
# - Coverage reporting
# - Security scanning

name: CI

on:
  # Run on push to main branch
  push:
    branches: [main]
  # Run on pull requests targeting main
  pull_request:
    branches: [main]
  # Allow manual triggers
  workflow_dispatch:
    inputs:
      run-e2e:
        description: "Run E2E tests (can be slow)"
        required: false
        default: "true"
        type: boolean
      run-coverage:
        description: "Generate and upload coverage report"
        required: false
        default: "true"
        type: boolean

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Environment variables available to all jobs
env:
  # CI flag for tools to detect CI environment
  CI: "true"
  # Disable MSW update snapshots in CI
  MSW_ENABLED: "true"

jobs:
  # ===========================================================================
  # Stage 1: Setup and Preparation
  # ===========================================================================

  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      bun-lock-hash: ${{ steps.hash.outputs.bun-lock-hash }}
      package-lock-hash: ${{ steps.hash.outputs.package-lock-hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for accurate changelog generation

      - name: Compute lockfile hashes
        id: hash
        run: |
          echo "bun-lock-hash=$(git hash-object bun.lock 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
          echo "package-lock-hash=$(git hash-object package-lock.json 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Set up Bun (primary)
        id: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Set up Node.js (for npm compatibility)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Verify installations
        run: |
          echo "Bun version: $(bun --version)"
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"

  # ===========================================================================
  # Stage 2: Linting and Formatting
  # ===========================================================================

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ needs.setup.outputs.bun-lock-hash }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies (if cache miss)
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Check Prettier formatting
        run: bun run format --dry-run

      - name: Run TypeScript type check
        run: bun run typecheck

  # ===========================================================================
  # Stage 3: Unit & Integration Tests
  # ===========================================================================

  test-unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: [setup, lint]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ needs.setup.outputs.bun-lock-hash }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies (if cache miss)
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun run playwright:install

      - name: Run Vitest with coverage
        run: bun run test:coverage
        env:
          # Configure Vitest for CI
          VITEST_BROWSER: "jsdom"

      - name: Upload coverage report
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
            test-results/
          retention-days: 30

      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage
          flags: vitest
          fail_ci_if_error: false

  # ===========================================================================
  # Stage 4: E2E Tests
  # ===========================================================================

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [setup, lint]
    # Only run E2E on main or if explicitly requested
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-e2e')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ needs.setup.outputs.bun-lock-hash }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies (if cache miss)
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bun run playwright:install

      - name: Start dev server
        run: bun run dev &
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Wait for server to start
        run: |
          echo "Waiting for server to start..."
          npx wait-on http://localhost:3000
          echo "Server is ready!"

      - name: Run Playwright tests
        run: bun run test:e2e
        env:
          BASE_URL: "http://localhost:3000"
          PLAYWRIGHT_BROWSERS: "chromium"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-results/
            playwright-report/
          retention-days: 30

      - name: Stop dev server
        if: always()
        run: pkill -f "bun run dev" || echo "Server already stopped"

  # ===========================================================================
  # Stage 5: Build Verification
  # ===========================================================================

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [setup, lint, test-unit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ needs.setup.outputs.bun-lock-hash }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies (if cache miss)
        run: bun install --frozen-lockfile

      - name: Run production build
        run: bun run build

      - name: Verify build output
        run: |
          echo "Checking build directory..."
          test -d dist && echo "dist directory exists" || exit 1
          echo "Build verification passed!"

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 7

      - name: Analyze bundle size
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Analyzing bundle size..."
          du -sh dist/ || true

  # ===========================================================================
  # Stage 6: Security Scanning
  # ===========================================================================

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Set up Node.js for npm audit
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Bun audit
        run: bun audit --json || echo "Bun audit: No vulnerabilities found or warnings"

      - name: Run npm audit
        run: npm audit --audit-level=critical --production || echo "npm audit: No critical vulnerabilities found"

      - name: Run ESLint security plugin (if configured)
        run: bun run lint || true

  # ===========================================================================
  # Stage 7: Release Artifacts (Main Branch Only)
  # ===========================================================================

  release-artifacts:
    name: Prepare Release Artifacts
    runs-on: ubuntu-latest
    needs: [setup, lint, test-unit, test-e2e, build, security]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ needs.setup.outputs.bun-lock-hash }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build production bundle
        run: bun run build

      - name: Get commit metadata
        id: meta
        run: |
          echo "commitча=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Create artifact archive
        run: |
          mkdir -p release/
          cp -r dist/ release/datenight-${{ steps.meta.outputs.commit }}-
          tar -czf release/datenight-${{ steps.meta.outputs.commit }}-${{ steps.meta.outputs.date }}.tar.gz -C release/ .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact
          path: release/
          retention-days: 30

# ===========================================================================
# Workflow Summary
# ===========================================================================
# This workflow runs:
# 1. Setup - Prepares environment and caches
# 2. Lint - ESLint, Prettier, TypeScript checks
# 3. Unit Tests - Vitest with coverage
# 4. E2E Tests - Playwright (on main or when requested)
# 5. Build - Production build verification
# 6. Security - Dependency vulnerability scanning
# 7. Release Artifacts - prepares release bundle (main only)
