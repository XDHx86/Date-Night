# Single linear CI pipeline for the Datenight SPA.
#
# Runs install, lint, typecheck, test, build, and deploys the static
# site to GitHub Pages on every push to `main`. Pull requests run the
# full matrix except for the deploy job, which is gated on a successful
# build push to `main`.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-flight runs of the same ref so re-pushes never queue stale
# builds. allow/disallow cancellation on deploy is intentional — we
# always want to ship the most recent push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install-lint-typecheck-test:
    name: Install, lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            package.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run Prettier format check
        run: npm run format:check

      - name: Run tests
        run: npm run test

  build:
    name: Build (Pages artifact)
    needs: install-lint-typecheck-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            package.json

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:gh-pages
        env:
          # Secrets are optional — the build succeeds even when the TMDB
          # keys are missing because the API is pure fetch and the
          # missing-token path is exercised at runtime only. Set these
          # in repo Settings → Secrets if/when you wire them.
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_TMDB_READ_ACCESS_TOKEN: ${{ secrets.VITE_TMDB_READ_ACCESS_TOKEN || ''}}
          VITE_SPOTIFY_PLAYLIST_ID: ${{ secrets.VITE_SPOTIFY_PLAYLIST_ID || '' }}
          VITE_LOVE_LETTER_CATEGORY: ${{ secrets.VITE_LOVE_LETTER_CATEGORY }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
