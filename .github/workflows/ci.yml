name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install-lint-typecheck-test:
    name: Install, lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript type check
        run: bun run typecheck

      - name: Run Prettier format check
        run: bunx prettier --check .

      # Uncomment when tests are fixed
      # - name: Run tests
      #   run: bun test

  build:
    name: Build (Pages artifact)
    needs: install-lint-typecheck-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: github-pages

    permissions:
      contents: read
      pages: write
      id-token: write

    env:
      NODE_ENV: production
      VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
      VITE_TMDB_READ_ACCESS_TOKEN: ${{ secrets.VITE_TMDB_READ_ACCESS_TOKEN }}
      VITE_SPOTIFY_PLAYLIST_ID: ${{ vars.VITE_SPOTIFY_PLAYLIST_ID }}
      VITE_LOVE_LETTER_CATEGORY: ${{ vars.VITE_LOVE_LETTER_CATEGORY }}
      VITE_LOVE_LETTER_FEATURE: ${{ vars.VITE_LOVE_LETTER_FEATURE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify build environment
        run: |
          echo "API key present: ${{ secrets.VITE_TMDB_API_KEY != '' }}"
          echo "Read token present: ${{ secrets.VITE_TMDB_READ_ACCESS_TOKEN != '' }}"

          node -e "console.log({
            apiKey: !!process.env.VITE_TMDB_API_KEY,
            token: !!process.env.VITE_TMDB_READ_ACCESS_TOKEN,
            spotify: !!process.env.VITE_SPOTIFY_PLAYLIST_ID
          })"

      - name: Build for GitHub Pages
        run: bun run build:gh-pages

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
