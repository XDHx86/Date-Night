# Single linear CI pipeline for the Datenight SPA.
#
# Runs install, lint, typecheck, test, build, and deploys the static
# site to GitHub Pages on every push to `main`. Pull requests run the
# full matrix except for the deploy job, which is gated on a successful
# build push to `main`.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install-lint-typecheck-test:
    name: Install, lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier version
        run: bunx prettier --version
      
      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript type check
        run: bun run typecheck

      - name: Run Prettier format check
        run: bun run format:check

      - name: Run tests
        run: bun test

  build:
    name: Build (Pages artifact)
    needs: install-lint-typecheck-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for GitHub Pages
        run: bun run build:gh-pages
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_TMDB_READ_ACCESS_TOKEN: ${{ secrets.VITE_TMDB_READ_ACCESS_TOKEN || '' }}
          VITE_SPOTIFY_PLAYLIST_ID: ${{ secrets.VITE_SPOTIFY_PLAYLIST_ID || '' }}
          VITE_LOVE_LETTER_CATEGORY: ${{ secrets.VITE_LOVE_LETTER_CATEGORY }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
