# Main CI pipeline: lint, type-check, test, build, and security scan.
# Triggered on push to main, PRs, and manual dispatch.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    uses: ./.github/workflows/lint.yml
    permissions:
      contents: read

  test:
    name: Unit & Integration Tests
    needs: lint
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  build:
    name: Production Build
    needs: lint
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read

  e2e:
    name: End-to-End Tests
    needs: [lint, build]
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    uses: ./.github/workflows/e2e.yml
    permissions:
      contents: read

  security:
    name: Security Scan
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      security-events: write
