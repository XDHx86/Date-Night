# =============================================================================
# Linting Workflow
# =============================================================================
# This workflow runs linting and formatting checks on every push and PR.

name: Lint

on:
  push:
    branches: [main, develop]
    paths:
      - "**.{ts,tsx,js,jsx,json,md}"
  pull_request:
    branches: [main]
    paths:
      - "**.{ts,tsx,js,jsx,json,md}"

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Check Prettier formatting
        run: bun run format --dry-run

      - name: Run TypeScript type check
        run: bun run typecheck

  # Verify with npm as well for compatibility
  lint-npm:
    name: Lint with npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            package-lock.json
          key: ubuntu-latest-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ubuntu-latest-node-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format --dry-run || echo "npm format check completed"

      - name: Run TypeScript type check
        run: npm run typecheck
