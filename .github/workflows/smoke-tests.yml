# Build smoke tests.
#
# After Bun has produced `.output/`, start a preview server and run
# the `smoke` Playwright project against the *production* bundle. This
# catches the most common CI failures (broken imports, missing
# chunks, route 500s) without burning through the full E2E matrix.

name: Smoke Tests

on:
  workflow_call:

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Production smoke (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Cache Playwright browsers
        id: cache-pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-smoke-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: pw-smoke-${{ runner.os }}-

      - name: Install Playwright (Chromium only)
        if: steps.cache-pw.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Run smoke against the production build
        run: bunx playwright test --project=smoke --project=setup
        env:
          PORT: 3000
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: |
            playwright-report/
            playwright-results/
          retention-days: 7
