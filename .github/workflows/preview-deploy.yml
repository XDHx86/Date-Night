# Preview deployment workflow.
#
# Hosts a snapshot of the production bundle on Cloudflare Pages with a
# short-lived URL scoped to the PR/branch. The URL is written back into
# the commit status and pushed to a comment for reviewers.
#
# Triggered automatically when a PR is opened or updated; skipped on
# direct pushes to `main` (the production deploy workflow handles that).
# Secrets required:
#   * CLOUDFLARE_API_TOKEN
#   * CLOUDFLARE_ACCOUNT_ID
#   * CLOUDFLARE_PAGES_PROJECT
# Optionally:
#   * VITE_TMDB_READ_ACCESS_TOKEN / VITE_TMDB_API_KEY for live data

name: Preview Deploy

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: preview-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_TMDB_READ_ACCESS_TOKEN: ${{ secrets.VITE_TMDB_READ_ACCESS_TOKEN }}
          VITE_SPOTIFY_PLAYLIST_ID: ${{ secrets.VITE_SPOTIFY_PLAYLIST_ID }}

      - name: Build with env
        run: bun run build
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_TMDB_READ_ACCESS_TOKEN: ${{ secrets.VITE_TMDB_READ_ACCESS_TOKEN }}
          VITE_SPOTIFY_PLAYLIST_ID: ${{ secrets.VITE_SPOTIFY_PLAYLIST_ID }}

      - name: Cache Playwright browsers
        id: cache-pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-preview-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: pw-preview-${{ runner.os }}-

      - name: Install Playwright (Chromium)
        if: steps.cache-pw.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@1.5.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          directory: .output
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref || github.ref_name }}
          # No wrangler.toml — Pages derives the project from secrets.

      - name: Run smoke tests against preview URL
        if: steps.deploy.outputs.url
        run: |
          bunx playwright test --project=smoke --project=setup
        env:
          PORT: 3000
          PLAYWRIGHT_BASE_URL: ${{ steps.deploy.outputs.url }}

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-smoke
          path: playwright-report/
          retention-days: 7

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.url
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deploy
          message: |
            🚀 Preview deploy ready:
            ${{ steps.deploy.outputs.url }}

            Smoke suite runs against the live URL — the artifact above has the executed report.

      - name: Fail job when no URL was produced
        if: steps.deploy.outputs.url == ''
        run: |
          echo "::error::Preview deploy did not produce a URL"
          exit 1
