# Coverage summary.
#
# Aggregates Vitest's per-project coverage, applies project-specific
# thresholds, and surfaces a Markdown summary as a PR comment. The
# workflow is opt-in via workflow_dispatch (manual) or the
# `coverage-summary` label.

name: Coverage Summary

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]
    branches: [main]

concurrency:
  group: coverage-summary-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  summary:
    name: Build coverage summary
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'coverage-summary')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full coverage suite
        run: bun run test:coverage

      - name: Render Markdown summary
        id: render
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const dirs = ['unit', 'integration', 'api']
            .map(d => `coverage/${d}/coverage-summary.json`)
            .filter(p => fs.existsSync(p));
          const tableHeader = '| Project | Lines | Functions | Branches | Statements |\n|---|---|---|---|---|';
          const rows = [];
          for (const file of dirs) {
            const j = JSON.parse(fs.readFileSync(file, 'utf8')).total;
            const fmt = (n) => `${n.pct}%`;
            rows.push(
              `| ${path.basename(path.dirname(file))} ` +
              `| ${fmt(j.lines)} | ${fmt(j.functions)} ` +
              `| ${fmt(j.branches)} | ${fmt(j.statements)} |`,
            );
          }
          const out = `## 📊 Coverage summary\n\n${tableHeader}\n${rows.join('\n')}`;
          fs.writeFileSync('coverage/summary.md', out);
          console.log(out);
          EOF

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/
          retention-days: 14

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-summary
          message: ${{ steps.render.outputs }}
