# =============================================================================
# Security Scanning Workflow
# =============================================================================
# This workflow performs security scans including:
# - Dependency vulnerability auditing
# - CodeQL static analysis
# - Secret scanning
# - SARIF report uploads

name: Security

on:
  # Run on push to main
  push:
    branches: [main]
  # Run on pull requests
  pull_request:
    branches: [main]
  # Run on schedule (weekly)
  schedule:
    - cron: "0 0 * * 1" # Every Monday at midnight UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  # ===========================================================================
  # Dependency Auditing
  # ===========================================================================

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Set up Node.js (for npm audit)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Bun audit
        run: |
          echo "Running Bun audit..."
          bun audit
        continue-on-error: true

      - name: Run npm audit
        run: |
          echo "Running npm audit..."
          npm install --package-lock-only
          npm audit --audit-level=moderate || echo "Some vulnerabilities found but continuing"
        continue-on-error: true

      - name: Summary of vulnerabilities
        if: always()
        run: |
          echo "=== Audit Summary ==="
          echo "Bun audit: COMPLETED"
          echo "npm audit: COMPLETED"
          echo ""
          echo "Dependabot will automatically create PRs for security updates."

  # ===========================================================================
  # CodeQL Analysis
  # ===========================================================================

  codeql:
    name: CodeQL Static Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript, javascript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:typescript"

  # ===========================================================================
  # ESLint Security Check
  # ===========================================================================

  eslint-security:
    name: ESLint Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            bun.lock
          key: ubuntu-latest-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ubuntu-latest-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint with security rules
        run: bun run lint || true
        continue-on-error: false

  # ===========================================================================
  # Dependency Review (for PRs)
  # ===========================================================================

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Dependency Review Action
        uses: actions/dependency-review-action@v4
        with:
          fail-on-semver-error: false
          fail-on-security-error: false
          comment-summary-in-pr: true
