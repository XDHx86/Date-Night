# Prettier format check (standalone). Mirrors the lint job's check but
# is exposed as its own reusable so wider gates (e.g. specific PR labels)
# can opt in.

name: Format Check

on:
  workflow_call:

concurrency:
  group: format-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Prettier formatting
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true
          cache-dependency-glob: |
            **/bun.lock
            **/package.json
            **/bunfig.toml

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format --check
